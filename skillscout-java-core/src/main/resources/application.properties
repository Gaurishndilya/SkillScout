server.port=8080
spring.application.name=skillscout-core

# LangChain4j Configuration (Gemini)
# You must provide an actual API key here before running. Replace "demo" with your key.
langchain4j.google-ai-gemini.chat-model.api-key=${GEMINI_API_KEY:demo}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-1.5-flash
langchain4j.google-ai-gemini.chat-model.temperature=0.3
